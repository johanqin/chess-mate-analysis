<!DOCTYPE html>
<html>
<head>
    <title>Chess Mate Square Analyzer</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        select {
            font-size: 16px;
            padding: 8px;
            margin: 20px;
        }
        .boards {
            display: flex;
            justify-content: center;
            gap: 40px;
        }
        .board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .subtitle {
            font-size: 13px;
            color: #aaa;
            margin-top: -5px;
            margin-bottom: 10px;
        }
        .board-with-labels {
            display: inline-block;
        }
        .board-row {
            display: flex;
        }
        .rank-label-cell {
            width: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #888;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            border: 2px solid #444;
        }
        .file-labels {
            display: flex;
            margin-left: 20px;
        }
        .file-labels .label {
            width: 50px;
        }
        .rank-labels {
            display: flex;
            flex-direction: column;
        }
        .rank-labels .label {
            width: 20px;
            height: 50px;
        }
        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            height: 50px;
        }
        .label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>Chess Mate Square Analyzer</h1>
    <select id="openingSelect"></select>
    <select id="ratingSelect">
        <option value="0,3000">All Ratings</option>
        <option value="800,1200">Beginner (800-1200)</option>
        <option value="1200,1600">Intermediate (1200-1600)</option>
        <option value="1600,2000">Advanced (1600-2000)</option>
        <option value="2000,2400">Expert (2000-2400)</option>
    </select>
    <div class="boards">
    <div class="board-wrapper">
        <h3>Where White Gets Checkmated</h3>
        <div class="board-with-labels">
            <div class="board-row">
                <div class="rank-labels" id="whiteRankLabels"></div>
                <div class="board" id="whiteBoard"></div>
            </div>
            <div class="file-labels" id="whiteFileLabels"></div>
        </div>
    </div>
    <div class="board-wrapper">
        <h3>Where Black Gets Checkmated</h3>
        <div class="board-with-labels">
            <div class="board-row">
                <div class="rank-labels" id="blackRankLabels"></div>
                <div class="board" id="blackBoard"></div>
            </div>
            <div class="file-labels" id="blackFileLabels"></div>
        </div>
    </div>
</div>

    <script src="/static/script.js?v=3"></script>
</body>
</html>
